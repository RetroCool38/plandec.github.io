<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLANdeC</title>

  <style>
    :root{
      --bg:#0f0f10;
      --card:#161618;
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --border:rgba(255,255,255,.12);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{max-width:1100px; margin:0 auto; padding:18px 18px 60px;}

    /* Top bar */
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:10px 0 18px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      color:var(--text);
    }
    .brand img{height:34px; width:auto; display:block}
    .nav{
      display:flex;
      gap:18px;
      font-size:14px;
    }
    .nav a{
      color:var(--muted);
      text-decoration:none;
      padding:8px 10px;
      border-radius:10px;
    }
    .nav a:hover{background:rgba(255,255,255,.06); color:var(--text);}

    /* Hero */
    .hero{
      margin-top:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
      border:1px solid var(--border);
      border-radius:18px;
      padding:46px 22px;
      text-align:center;
    }
    .heroLogo{
      width:520px;
      max-width:92%;
      height:auto;
      display:block;
      margin:0 auto 18px;
    }
    h1{
      margin:10px 0 10px;
      font-size:44px;
      letter-spacing:.2px;
    }
    p{
      margin:0 auto 22px;
      max-width:720px;
      font-size:18px;
      line-height:1.55;
      color:var(--muted);
    }

    .actions{display:flex; justify-content:center; gap:12px; flex-wrap:wrap;}
    .btn{
      display:inline-block;
      padding:12px 16px;
      border-radius:12px;
      border:1px solid var(--border);
      text-decoration:none;
      font-weight:700;
      font-size:14px;
    }
    .btnPrimary{
      background:#ffffff;
      color:#0f0f10;
      border-color:#ffffff;
    }
    .btnGhost{
      background:transparent;
      color:var(--text);
    }

    /* Small note */
    .note{
      margin-top:14px;
      font-size:12px;
      color:rgba(255,255,255,.55);
    }

    @media (max-width:520px){
      h1{font-size:34px}
      p{font-size:16px}
      .nav{display:none;}
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="top">
      <a class="brand" href="#">
        <img src="logo333.png" alt="PLANdeC" />
      </a>

      <div class="nav">
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Contacto</a>
      </div>
    </div>

    <section class="hero">
      <img class="heroLogo" src="logo333.png" alt="PLANdeC" />
      <h1>Estrategia, ejecución y resultados</h1>
      <p>
        PLANdeC impulsa decisiones claras y planes accionables para crecer con orden, foco y ventaja competitiva.
      </p>

      <div class="actions">
        <a class="btn btnPrimary" href="mailto:contacto@plandec.com">Solicitar asesoría</a>
        <a class="btn btnGhost" href="#contacto">Ver contacto</a>
      </div>

      <div class="note">Sitio en construcción · Próximamente más secciones</div>
    </section>

  </div>
</body>
</html>
